# 公告原文抓取工具配置
notice_content_fetcher:
  # API配置
  api_url: "https://np-cnotice-stock.eastmoney.com/api/content/ann"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    Referer: "https://data.eastmoney.com/"

  # 频率控制
  delay_min: 0.3          # 最小请求间隔（秒）
  delay_max: 0.8          # 最大请求间隔（秒）
  request_timeout: 10     # 单次请求超时（秒）

  # 容错配置
  max_consecutive_fail: 10    # 连续失败上限，触发暂停
  pause_seconds: 60           # 暂停时间（秒）
  max_retries: 3              # 单条最大重试次数

  # 批量处理
  batch_size: 2000            # 单批最大处理条数
  
  # art_code提取正则
  art_code_pattern: "(AN\\d+)\\.html"
