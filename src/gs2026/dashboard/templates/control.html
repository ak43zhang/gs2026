<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据采集 - GS2026 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; color: #333; }
        
        /* 顶栏 */
        .topbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0 24px; height: 42px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .topbar h1 { font-size: 15px; white-space: nowrap; }
        .topbar-nav { display: flex; gap: 18px; align-items: center; }
        .topbar-nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px; padding: 2px 0; border-bottom: 2px solid transparent; transition: 0.2s; }
        .topbar-nav a:hover, .topbar-nav a.active { color: #fff; border-bottom-color: #fff; }
        
        .container { 
            width: 100%;
            max-width: 100%;
            margin: 16px auto; 
            padding: 0 16px; 
        }
        
        /* 响应式适配 */
        @media (max-width: 1366px) {
            .container { padding: 0 8px; margin: 8px auto; }
            .service-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        }
        
        @media (min-width: 1920px) {
            .container { max-width: 1920px; }
            .service-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        }
        
        @media (max-width: 1024px) {
            .service-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        }
        
        /* 监控程序区域 */
        .section { background: #fff; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .section-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title .icon { font-size: 18px; }
        
        /* 服务卡片网格 - 响应式 */
        .service-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 12px; 
        }
        .service-card { background: #f8f9fa; border-radius: 6px; padding: 14px; border: 1px solid #e8eaf6; transition: all 0.2s; }
        .service-card:hover { border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.1); }
        .service-name { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .service-status { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.running { background: #4caf50; box-shadow: 0 0 6px #4caf50; animation: pulse 2s infinite; }
        .status-dot.stopped { background: #ccc; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .status-text.running { color: #4caf50; font-weight: bold; }
        .status-text.stopped { color: #999; }
        .service-pid { font-size: 11px; color: #888; margin-left: auto; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 8px 0; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .btn-start { background: #4caf50; color: white; }
        .btn-start:hover { background: #43a047; }
        .btn-start:disabled { background: #c8e6c9; cursor: not-allowed; }
        .btn-stop { background: #f44336; color: white; }
        .btn-stop:hover { background: #e53935; }
        .btn-stop:disabled { background: #ffcdd2; cursor: not-allowed; }
        
        /* 日志区域 */
        .log-section { background: #1e1e1e; border-radius: 6px; padding: 12px; height: 280px; overflow-y: auto; }
        .log-entry { font-family: Consolas, monospace; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #333; color: #d4d4d4; }
        .log-time { color: #858585; margin-right: 8px; }
        .log-info { color: #4fc1ff; }
        .log-success { color: #4caf50; }
        .log-error { color: #f44336; }
        .log-warn { color: #ff9800; }
        
        /* 全局操作 */
        .global-actions { display: flex; gap: 10px; margin-bottom: 16px; }
        .global-actions .btn { padding: 10px 24px; font-size: 13px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5c6bc0; }
        .btn-danger { background: #e53935; color: white; }
        .btn-danger:hover { background: #d32f2f; }
        
        /* Tab 导航 */
        .tab-nav { display: flex; gap: 2px; margin-bottom: 16px; }
        .tab-btn { padding: 10px 24px; border: none; border-radius: 6px 6px 0 0; font-size: 14px; cursor: pointer; background: #e0e0e0; color: #666; font-weight: 500; transition: all 0.2s; }
        .tab-btn.active { background: #667eea; color: white; }
        .tab-btn:hover { background: #bbb; color: #333; }
        .tab-btn.active:hover { background: #5c6bc0; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 参数表单 */
        .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .param-label { font-size: 12px; color: #666; min-width: 90px; }
        .param-input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; outline: none; }
        .param-input:focus { border-color: #667eea; }
        .param-hint { font-size: 10px; color: #aaa; margin-top: 2px; }
        
        /* 进程列表样式 */
        .process-list { max-height: 300px; overflow-y: auto; }
        .process-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 12px; 
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        .process-item:last-child { border-bottom: none; }
        .process-item:hover { background: #f8f9fb; }
        .process-item.running { border-left: 3px solid #43a047; }
        .process-item.stopped { border-left: 3px solid #e53935; }
        .process-item.empty { color: #999; text-align: center; justify-content: center; }
        .process-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .process-actions { display: flex; align-items: center; gap: 8px; }
        .process-name { font-weight: 500; color: #333; }
        .process-pid { 
            background: #667eea; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-family: monospace;
        }
        .process-status {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .process-status.running { background: #e8f5e9; color: #2e7d32; }
        .process-status.stopped { background: #ffebee; color: #c62828; }
        .process-type { font-size: 11px; color: #999; margin-left: 8px; }
        .process-params { font-size: 10px; color: #666; font-family: monospace; }
        .btn-stop-sm {
            padding: 2px 8px;
            font-size: 11px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-stop-sm:hover { background: #c62828; }
        .process-status.running { background: #e8f5e9; color: #2e7d32; }
        .process-status.stopped { background: #ffebee; color: #c62828; }
        .process-type { font-size: 11px; color: #999; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>📊 GS2026 数据采集 & 分析</h1>
        <div class="topbar-nav">
            <a href="/">首页</a>
            <a href="/monitor">数据监控</a>
            <a href="/control" class="active">数据采集</a>
        </div>
    </div>
    
    <div class="container">
        <!-- Tab 导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('monitor', this)">👁️ 开市采集</button>
            <button class="tab-btn" onclick="switchTab('analysis', this)">🤖 数据分析</button>
        </div>
        
        <!-- ===== Tab1: 开市采集 ===== -->
        <div class="tab-content active" id="tab-monitor">
            <!-- 全局操作 -->
            <div class="global-actions">
                <button class="btn btn-primary" onclick="startAll()">▶ 启动全部</button>
                <button class="btn btn-danger" onclick="stopAll()">⏹ 停止全部</button>
            </div>
        
        <!-- 监控程序 -->
        <div class="section">
            <div class="section-title"><span class="icon">👁️</span> 监控程序</div>
            <div class="service-grid">
                <!-- 股票监控 -->
                <div class="service-card" data-service="stock">
                    <div class="service-name">📈 股票监控</div>
                    <div class="service-status">
                        <span class="status-dot stopped" id="stock-dot"></span>
                        <span class="status-text stopped" id="stock-text">已停止</span>
                        <span class="service-pid" id="stock-pid"></span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-start" id="stock-start" onclick="startService('stock')">启动</button>
                        <button class="btn btn-stop" id="stock-stop" onclick="stopService('stock')" disabled>停止</button>
                    </div>
                </div>
                
                <!-- 债券监控 -->
                <div class="service-card" data-service="bond">
                    <div class="service-name">💹 债券监控</div>
                    <div class="service-status">
                        <span class="status-dot stopped" id="bond-dot"></span>
                        <span class="status-text stopped" id="bond-text">已停止</span>
                        <span class="service-pid" id="bond-pid"></span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-start" id="bond-start" onclick="startService('bond')">启动</button>
                        <button class="btn btn-stop" id="bond-stop" onclick="stopService('bond')" disabled>停止</button>
                    </div>
                </div>
                
                <!-- 行业监控 -->
                <div class="service-card" data-service="industry">
                    <div class="service-name">🏭 行业监控</div>
                    <div class="service-status">
                        <span class="status-dot stopped" id="industry-dot"></span>
                        <span class="status-text stopped" id="industry-text">已停止</span>
                        <span class="service-pid" id="industry-pid"></span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-start" id="industry-start" onclick="startService('industry')">启动</button>
                        <button class="btn btn-stop" id="industry-stop" onclick="stopService('industry')" disabled>停止</button>
                    </div>
                </div>
                
                <!-- 大盘信号 -->
                <div class="service-card" data-service="dp_signal">
                    <div class="service-name">📊 大盘信号</div>
                    <div class="service-status">
                        <span class="status-dot stopped" id="dp_signal-dot"></span>
                        <span class="status-text stopped" id="dp_signal-text">已停止</span>
                        <span class="service-pid" id="dp_signal-pid"></span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-start" id="dp_signal-start" onclick="startService('dp_signal')">启动</button>
                        <button class="btn btn-stop" id="dp_signal-stop" onclick="stopService('dp_signal')" disabled>停止</button>
                    </div>
                </div>
                
                <!-- 股债信号 -->
                <div class="service-card" data-service="gp_zq_signal">
                    <div class="service-name">🔗 股债信号</div>
                    <div class="service-status">
                        <span class="status-dot stopped" id="gp_zq_signal-dot"></span>
                        <span class="status-text stopped" id="gp_zq_signal-text">已停止</span>
                        <span class="service-pid" id="gp_zq_signal-pid"></span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-start" id="gp_zq_signal-start" onclick="startService('gp_zq_signal')">启动</button>
                        <button class="btn btn-stop" id="gp_zq_signal-stop" onclick="stopService('gp_zq_signal')" disabled>停止</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 当前进程 -->
        <div class="section">
            <div class="section-title"><span class="icon">⚙️</span> 当前进程</div>
            <div id="monitor-processes-container">
                <div class="process-list" id="monitor-processes-list">
                    <div class="process-item empty">暂无运行中的服务</div>
                </div>
            </div>
        </div>
        </div><!-- 关闭 tab-monitor -->
        
        <!-- ===== Tab2: 数据分析 ===== -->
        <div class="tab-content" id="tab-analysis">
            <div class="global-actions">
                <button class="btn btn-primary" onclick="startAllAnalysis()">▶ 启动全部分析</button>
                <button class="btn btn-danger" onclick="stopAllAnalysis()">⏹ 停止全部分析</button>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">🤖</span> AI分析程序</div>
                <div class="service-grid" id="analysis-grid">
                    <!-- 动态生成 -->
                </div>
            </div>
            
            <!-- 运行中的进程服务 -->
            <div class="section">
                <div class="section-title"><span class="icon">⚙️</span> 运行中的进程服务</div>
                <div id="running-processes-container">
                    <div class="process-list" id="running-processes-list">
                        <div class="process-item empty">暂无运行中的服务</div>
                    </div>
                </div>
            </div>
        </div><!-- 关闭 tab-analysis -->
    </div>
    
    <script>
        // 服务配置
        const SERVICES = {
            stock: { name: '股票监控', file: 'monitor_stock.py' },
            bond: { name: '债券监控', file: 'monitor_bond.py' },
            industry: { name: '行业监控', file: 'monitor_industry.py' },
            dp_signal: { name: '大盘信号', file: 'monitor_dp_signal.py' },
            gp_zq_signal: { name: '股债信号', file: 'monitor_gp_zq_rising_signal.py' }
        };
        
        // 添加日志
        function addLog(message, type = 'info') {
            console.log(`[${type}] ${message}`);
            
            // 尝试添加到日志容器（如果存在）
            const container = document.getElementById('log-container');
            if (!container) {
                return;
            }
            
            const time = new Date().toLocaleTimeString();
            const typeClass = type === 'success' ? 'log-success' : (type === 'error' ? 'log-error' : (type === 'warn' ? 'log-warn' : 'log-info'));
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${message}</span>`;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            
            // 限制日志条数
            while (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
        }
        
        // 更新服务状态
        function updateServiceStatus(service, running, pid) {
            const dot = document.getElementById(`${service}-dot`);
            const text = document.getElementById(`${service}-text`);
            const pidEl = document.getElementById(`${service}-pid`);
            const startBtn = document.getElementById(`${service}-start`);
            const stopBtn = document.getElementById(`${service}-stop`);
            
            if (running) {
                dot.className = 'status-dot running';
                text.className = 'status-text running';
                text.textContent = '运行中';
                pidEl.textContent = pid ? `PID:${pid}` : '';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                dot.className = 'status-dot stopped';
                text.className = 'status-text stopped';
                text.textContent = '已停止';
                pidEl.textContent = '';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        
        // 加载所有状态
        async function loadAllStatus() {
            try {
                const response = await fetch('/api/control/services-status');
                const result = await response.json();
                
                if (result.success) {
                    Object.keys(SERVICES).forEach(service => {
                        const data = result.data[service] || { running: false };
                        updateServiceStatus(service, data.running, data.pid);
                    });
                }
            } catch (e) {
                addLog('获取状态失败: ' + e.message, 'error');
            }
        }
        
        // 启动服务
        async function startService(service) {
            const config = SERVICES[service];
            addLog(`正在启动 ${config.name}...`);
            
            try {
                const response = await fetch(`/api/control/start-service/${service}`, { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    addLog(`${config.name} 已启动，PID: ${result.pid}`, 'success');
                    updateServiceStatus(service, true, result.pid);
                } else {
                    addLog(`${config.name} 启动失败: ${result.message}`, 'error');
                }
            } catch (e) {
                addLog(`${config.name} 启动失败: ${e.message}`, 'error');
            }
        }
        
        // 停止服务
        async function stopService(service) {
            const config = SERVICES[service];
            addLog(`正在停止 ${config.name}...`);
            
            try {
                const response = await fetch(`/api/control/stop-service/${service}`, { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    addLog(`${config.name} 已停止`, 'success');
                    updateServiceStatus(service, false);
                } else {
                    addLog(`${config.name} 停止失败: ${result.message}`, 'error');
                }
            } catch (e) {
                addLog(`${config.name} 停止失败: ${e.message}`, 'error');
            }
        }
        
        // 启动全部
        async function startAll() {
            addLog('正在启动所有服务...', 'warn');
            for (const service of Object.keys(SERVICES)) {
                await startService(service);
                await new Promise(r => setTimeout(r, 500)); // 间隔500ms避免冲突
            }
            addLog('全部服务启动完成', 'success');
        }
        
        // 停止全部
        async function stopAll() {
            addLog('正在停止所有服务...', 'warn');
            for (const service of Object.keys(SERVICES)) {
                await stopService(service);
                await new Promise(r => setTimeout(r, 500));
            }
            addLog('全部服务已停止', 'success');
        }
        
        // 页面加载时获取状态
        loadAllStatus();
        loadAnalysisConfig();
        
        // 定时刷新状态（每3秒）
        setInterval(() => { loadAllStatus(); loadAnalysisStatus(); }, 3000);
        
        // ===== Tab 切换 =====
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            if (btn) btn.classList.add('active');
            
            // 切换到数据分析 Tab 时加载配置
            if (tab === 'analysis' && Object.keys(ANALYSIS_CONFIG).length === 0) {
                loadAnalysisConfig();
            }
        }
        
        // ===== 分析服务 =====
        let ANALYSIS_CONFIG = {};
        
        async function loadAnalysisConfig() {
            try {
                const r = await (await fetch('/api/control/analysis-config')).json();
                if (r.success) {
                    ANALYSIS_CONFIG = r.data;
                    renderAnalysisCards();
                    loadAnalysisStatus();
                } else {
                    console.error('加载分析配置失败:', r);
                    addAnalysisLog('加载分析配置失败', 'error');
                }
            } catch(e) {
                console.error('加载分析配置失败:', e);
                addAnalysisLog('加载分析配置失败: ' + e.message, 'error');
            }
        }
        
        function renderAnalysisCards() {
            console.log('renderAnalysisCards called, config:', ANALYSIS_CONFIG);
            const grid = document.getElementById('analysis-grid');
            if (!grid) {
                console.error('analysis-grid element not found');
                return;
            }
            
            const icons = { event_driven: '🎯', news_cls: '📰', news_combine: '📊', news_ztb: '📈', notice: '📢' };
            let html = '';
            
            Object.entries(ANALYSIS_CONFIG).forEach(([id, cfg]) => {
                console.log('Rendering card:', id, cfg);
                const icon = icons[id] || '🤖';
                
                // 参数表单
                let paramsHtml = '';
                (cfg.params || []).forEach(p => {
                    if (p.type === 'date_list') {
                        const today = new Date().toISOString().slice(0,10).replace(/-/g, '-');
                        paramsHtml += `<div class="param-row">
                            <span class="param-label">${p.label}</span>
                            <input class="param-input" type="date" id="param-${id}-${p.name}" value="${today}"/>
                        </div>`;
                    } else if (p.type === 'number') {
                        paramsHtml += `<div class="param-row">
                            <span class="param-label">${p.label}</span>
                            <input class="param-input" type="number" id="param-${id}-${p.name}" value="${p.default}"/>
                        </div>`;
                    } else {
                        paramsHtml += `<div class="param-row">
                            <span class="param-label">${p.label}</span>
                            <input class="param-input" type="text" id="param-${id}-${p.name}" value="${p.default}"/>
                        </div>`;
                    }
                });
                
                html += `<div class="service-card" data-service="${id}">
                    <div class="service-name">${icon} ${cfg.name}</div>
                    <div class="service-status">
                        <span class="status-dot stopped" id="a-${id}-dot"></span>
                        <span class="status-text stopped" id="a-${id}-text">已停止</span>
                        <span class="service-pid" id="a-${id}-pid"></span>
                    </div>
                    ${paramsHtml}
                    <div class="btn-group">
                        <button class="btn btn-start" id="a-${id}-start" onclick="startAnalysis('${id}')">启动</button>
                        <button class="btn btn-stop" id="a-${id}-stop" onclick="stopAnalysis('${id}')" disabled>停止</button>
                    </div>
                </div>`;
            });
            
            grid.innerHTML = html;
        }
        
        function updateAnalysisStatus(service, running, pid) {
            const dot = document.getElementById(`a-${service}-dot`);
            const text = document.getElementById(`a-${service}-text`);
            const pidEl = document.getElementById(`a-${service}-pid`);
            const startBtn = document.getElementById(`a-${service}-start`);
            const stopBtn = document.getElementById(`a-${service}-stop`);
            if (!dot) return;
            
            if (running) {
                dot.className = 'status-dot running';
                text.className = 'status-text running';
                text.textContent = '运行中';
                pidEl.textContent = pid ? `PID:${pid}` : '';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                dot.className = 'status-dot stopped';
                text.className = 'status-text stopped';
                text.textContent = '已停止';
                pidEl.textContent = '';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        
        async function loadAnalysisStatus() {
            try {
                const r = await (await fetch('/api/control/analysis-status')).json();
                if (r.success) {
                    Object.keys(ANALYSIS_CONFIG).forEach(id => {
                        const data = r.data[id] || { running: false };
                        updateAnalysisStatus(id, data.running, data.pid);
                    });
                }
            } catch(e) {}
        }
        
        function getAnalysisParams(serviceId) {
            const cfg = ANALYSIS_CONFIG[serviceId];
            const params = {};
            (cfg.params || []).forEach(p => {
                const el = document.getElementById(`param-${serviceId}-${p.name}`);
                if (el) {
                    if (p.type === 'date_list') {
                        // 日期控件转为 YYYY-MM-DD 格式
                        params[p.name] = el.value.replace(/-/g, '-');
                    } else {
                        params[p.name] = el.value;
                    }
                }
            });
            return params;
        }
        
        async function startAnalysis(serviceId) {
            console.log('startAnalysis called:', serviceId);
            console.log('ANALYSIS_CONFIG:', ANALYSIS_CONFIG);
            
            const cfg = ANALYSIS_CONFIG[serviceId];
            if (!cfg) {
                console.error('配置未找到:', serviceId);
                alert('服务配置未加载，请刷新页面');
                return;
            }
            
            const params = getAnalysisParams(serviceId);
            addAnalysisLog(`正在启动 ${cfg.name}...`);
            
            try {
                const r = await (await fetch(`/api/control/start-analysis/${serviceId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(params)
                })).json();
                
                if (r.success) {
                    addAnalysisLog(`${cfg.name} 已启动，PID: ${r.pid}`, 'success');
                    updateAnalysisStatus(serviceId, true, r.pid);
                } else {
                    addAnalysisLog(`${cfg.name} 启动失败: ${r.message}`, 'error');
                }
            } catch(e) {
                addAnalysisLog(`${cfg.name} 启动失败: ${e.message}`, 'error');
            }
        }
        
        async function stopAnalysis(serviceId) {
            const cfg = ANALYSIS_CONFIG[serviceId];
            addAnalysisLog(`正在停止 ${cfg.name}...`);
            
            try {
                const r = await (await fetch(`/api/control/stop-analysis/${serviceId}`, { method: 'POST' })).json();
                if (r.success) {
                    addAnalysisLog(`${cfg.name} 已停止`, 'success');
                    updateAnalysisStatus(serviceId, false);
                } else {
                    addAnalysisLog(`${cfg.name} 停止失败: ${r.message}`, 'error');
                }
            } catch(e) {
                addAnalysisLog(`${cfg.name} 停止失败: ${e.message}`, 'error');
            }
        }
        
        async function startAllAnalysis() {
            addAnalysisLog('正在启动所有分析服务...', 'warn');
            for (const id of Object.keys(ANALYSIS_CONFIG)) {
                await startAnalysis(id);
                await new Promise(r => setTimeout(r, 500));
            }
            addAnalysisLog('全部分析服务启动完成', 'success');
        }
        
        async function stopAllAnalysis() {
            addAnalysisLog('正在停止所有分析服务...', 'warn');
            for (const id of Object.keys(ANALYSIS_CONFIG)) {
                await stopAnalysis(id);
                await new Promise(r => setTimeout(r, 500));
            }
            addAnalysisLog('全部分析服务已停止', 'success');
        }
        
        function addAnalysisLog(message, type = 'info') {
            console.log(`[${type}] ${message}`);
            
            // 尝试添加到日志容器（如果存在）
            const container = document.getElementById('analysis-log-container');
            if (!container) {
                // 如果没有日志容器，使用 console 输出
                return;
            }
            
            const time = new Date().toLocaleTimeString();
            const typeClass = type === 'success' ? 'log-success' : (type === 'error' ? 'log-error' : (type === 'warn' ? 'log-warn' : 'log-info'));
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${typeClass}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            while (container.children.length > 100) container.removeChild(container.firstChild);
        }
        
        // ===== 运行中的进程服务监控 =====
        async function loadRunningProcesses() {
            try {
                const r = await (await fetch('/api/control/monitor-status')).json();
                if (r.success) {
                    renderRunningProcesses(r.data);
                }
            } catch(e) {
                console.error('加载进程状态失败:', e);
            }
        }
        
        function renderRunningProcesses(processes) {
            // 更新数据分析页面的进程列表
            const analysisContainer = document.getElementById('running-processes-list');
            if (analysisContainer) {
                renderProcessList(analysisContainer, processes, ['analysis', 'analysis_service']);
            }
            
            // 更新数据采集页面的进程列表
            const monitorContainer = document.getElementById('monitor-processes-list');
            if (monitorContainer) {
                renderProcessList(monitorContainer, processes, ['collection', 'monitor', 'monitor_service']);
            }
        }
        
        function renderProcessList(container, processes, allowedTypes) {
            // 过滤指定类型的运行中进程
            const filteredProcesses = processes.filter(p => {
                const typeMatch = allowedTypes.includes(p.process_type);
                const isRunning = p.status === 'running' || p.is_running;
                return typeMatch && isRunning;
            });
            
            if (filteredProcesses.length === 0) {
                container.innerHTML = '<div class="process-item empty">暂无运行中的服务</div>';
                return;
            }
            
            let html = '';
            filteredProcesses.forEach(p => {
                const statusClass = p.status === 'running' ? 'running' : 'stopped';
                const statusText = p.status === 'running' ? '运行中' : '已停止';
                const typeMap = {
                    'collection': '数据采集',
                    'analysis': 'AI分析',
                    'monitor': '监控程序',
                    'monitor_service': '监控服务',
                    'analysis_service': '分析服务'
                };
                const typeText = typeMap[p.process_type] || p.process_type;
                
                // 格式化参数显示
                let paramsHtml = '';
                if (p.params && Object.keys(p.params).length > 0) {
                    const paramsStr = Object.entries(p.params)
                        .map(([k, v]) => `${k}=${v}`)
                        .join(', ');
                    paramsHtml = `<span class="process-params">${paramsStr}</span>`;
                }
                
                // 停止按钮（只对运行中的显示）
                const stopButton = p.status === 'running' 
                    ? `<button class="btn btn-stop-sm" onclick="stopProcessInstance('${p.process_id}', '${container.id}')">停止</button>`
                    : '';
                
                html += `
                    <div class="process-item ${statusClass}">
                        <div class="process-info">
                            <span class="process-name">${p.process_id}</span>
                            <span class="process-type">${typeText}</span>
                            ${paramsHtml}
                        </div>
                        <div class="process-actions">
                            <span class="process-status ${statusClass}">${statusText}</span>
                            <span class="process-pid">PID:${p.pid}</span>
                            ${stopButton}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, initializing...');
            
            // 加载数据采集状态
            loadAllStatus();
            setInterval(loadAllStatus, 5000);
            
            // 加载分析配置
            loadAnalysisConfig();
            
            // 加载进程状态
            loadRunningProcesses();
            setInterval(loadRunningProcesses, 10000);
            
            // 测试按钮点击
            console.log('Initialization complete');
        });
        
        // 停止指定进程实例
        async function stopProcessInstance(processId, containerId) {
            if (!confirm(`确定要停止进程 ${processId} 吗？`)) {
                return;
            }
            
            try {
                // 判断是监控服务还是分析服务
                const isAnalysis = processId.includes('news_') || processId.includes('event_') || 
                                  processId.includes('ztb_') || processId.includes('notice_') ||
                                  processId.includes('combine_');
                
                const url = isAnalysis 
                    ? `/api/control/stop-analysis-instance/${processId}`
                    : `/api/control/stop-service-instance/${processId}`;
                
                const r = await (await fetch(url, { method: 'POST' })).json();
                
                if (r.success) {
                    alert(`进程 ${processId} 已停止`);
                    // 刷新列表
                    loadRunningProcesses();
                } else {
                    alert(`停止失败: ${r.message}`);
                }
            } catch(e) {
                alert(`停止失败: ${e.message}`);
            }
        }
    </script>
</body>
</html>
