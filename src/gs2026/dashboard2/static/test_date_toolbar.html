<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试日期工具栏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .date-toolbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .date-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .date-input {
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
        }
        
        .btn-today {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        .main-content {
            padding: 20px 40px;
            background: #f5f5f5;
            min-height: 200px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="app-header">
        <div>📊 GS2026 | 数据监控</div>
        <nav>首页 数据监控 数据采集</nav>
    </header>
    
    <!-- 日期工具栏 -->
    <div class="date-toolbar">
        <div class="date-picker-wrapper">
            <input type="date" class="date-input" value="2026-03-27">
            <button class="btn-today">今天</button>
        </div>
    </div>
    
    <!-- 主内容 -->
    <main class="main-content">
        <h2>主内容区域</h2>
        <p>日期工具栏应该在导航栏下方显示</p>
    </main>
</body>
</html>
