<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS2026 - 报表中心</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/report.css') }}?v=1">
</head>
<body>
    <div class="app">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">GS2026</span>
                </div>
                <span class="header-divider">|</span>
                <span class="header-subtitle">报表中心</span>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/monitor" class="nav-item">数据监控</a>
                <a href="/collection" class="nav-item">数据采集</a>
                <a href="/analysis" class="nav-item">数据分析</a>
                <a href="/scheduler" class="nav-item">调度中心</a>
                <a href="/reports" class="nav-item active">报表中心</a>
                <a href="/performance" class="nav-item">性能监控</a>
                <a href="/news" class="nav-item">新闻中心</a>
            </nav>
        </header>

        <!-- 主内容区 -->
        <main class="app-main" id="main-content">
            <!-- 页面内容由 JS 动态加载 -->
        </main>
    </div>

    <!-- 核心框架 -->
    <script src="{{ url_for('static', filename='js/core/logger.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/event-bus.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/api-client.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/state-store.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/notification.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/app.js') }}"></script>
    
    <!-- 模块脚本 -->
    <script src="{{ url_for('static', filename='js/modules/base-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/report-manager.js') }}"></script>
    
    <!-- 文档阅读器组件 -->
    <script src="{{ url_for('static', filename='js/components/doc-viewers/index.js') }}?v=1"></script>
    <script src="{{ url_for('static', filename='js/components/doc-viewers/pdf-viewer.js') }}?v=1"></script>
    <script src="{{ url_for('static', filename='js/components/doc-viewers/epub-viewer.js') }}?v=1"></script>
    <script src="{{ url_for('static', filename='js/components/doc-viewers/md-viewer.js') }}?v=1"></script>
    <script src="{{ url_for('static', filename='js/components/doc-viewers/docx-viewer.js') }}?v=1"></script>
    <script src="{{ url_for('static', filename='js/components/doc-viewers/xlsx-viewer.js') }}?v=1"></script>
    
    <!-- 页面脚本 -->
    <script src="{{ url_for('static', filename='js/pages/report-page.js') }}?v=1"></script>
    
    <script>
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            GS2026.initPage('report');
        });
    </script>
</body>
</html>
