<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GS2026 - 数据采集</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}?v=3">
</head>
<body>
    <div class="app">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">GS2026</span>
                </div>
                <span class="header-divider">|</span>
                <span class="header-subtitle">数据监控</span>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/monitor" class="nav-item">数据监控</a>
                <a href="/collection" class="nav-item active">数据采集</a>
                <a href="/analysis" class="nav-item">数据分析</a>
                <a href="/scheduler" class="nav-item">调度中心</a>
                <a href="/reports" class="nav-item">报告中心</a>
                <a href="/performance" class="nav-item">性能监控</a>
                <a href="/news" class="nav-item">新闻中心</a>
            </nav>
        </header>

        <main class="app-main">
            <!-- Tab 导航 -->
            <div id="tab-nav"></div>

            <!-- 服务网格 -->
            <section class="service-section">
                <div id="service-grid" class="service-grid"></div>
            </section>

            <!-- 进程列表 -->
            <section class="process-section">
                <h3 class="section-title">⚙️ 当前运行进程服务</h3>
                <div id="process-list"></div>
            </section>
        </main>
    </div>

    <!-- 核心框架 -->
    <script src="{{ url_for('static', filename='js/core/logger.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/event-bus.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/api-client.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/state-store.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/notification.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/app.js') }}"></script>

    <!-- 管理器 -->
    <script src="{{ url_for('static', filename='js/modules/base-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/collection-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/analysis-manager.js') }}"></script>

    <!-- 组件 -->
    <script src="{{ url_for('static', filename='js/components/base-component.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/tab-nav.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/service-card.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/process-list.js') }}?v=15"></script>

    <!-- 页面 -->
    <script src="{{ url_for('static', filename='js/pages/collection-page.js') }}"></script>
</body>
</html>
