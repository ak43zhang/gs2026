<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>公告分析 - GS2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/analysis_center.css') }}?v=1">
</head>
<body>
    <div class="app">
        <!-- 头部导航 - 与首页统一 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">GS2026</span>
                </div>
                <span class="header-divider">|</span>
                <span class="header-subtitle">公告分析</span>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/monitor" class="nav-item">数据监控</a>
                <a href="/collection" class="nav-item">数据采集</a>
                <a href="/analysis" class="nav-item">数据分析</a>
                <a href="/scheduler" class="nav-item">调度中心</a>
                <a href="/reports" class="nav-item">报告中心</a>
                <a href="/performance" class="nav-item">性能监控</a>
                <a href="/news" class="nav-item">新闻中心</a>
            </nav>
        </header>

        <main class="app-main">
            <!-- 分析中心子模块导航 -->
            <div class="analysis-sub-nav" style="background: #f8f9fa; border-bottom: 1px solid #e9ecef; padding: 10px 20px;">
                <div style="display: flex; gap: 10px; max-width: 1400px; margin: 0 auto;">
                    <a href="/analysis-center" class="sub-nav-btn" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #666; font-size: 14px;">📈 涨停分析</a>
                    <a href="/news" class="sub-nav-btn" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #666; font-size: 14px;">📰 新闻分析</a>
                    <a href="/notice-analysis" class="sub-nav-btn active" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #fff; background: #007bff; font-size: 14px;">📋 公告分析</a>
                    <a href="/domain-analysis" class="sub-nav-btn" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #666; font-size: 14px;">🌐 领域分析</a>
                </div>
            </div>
            
            <!-- 动态内容区域 -->
            <div class="analysis-content" id="analysis-content" style="padding: 20px; max-width: 1400px; margin: 0 auto;">
                <div class="notice-container">
                    <div class="filter-bar" style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
                        <input type="date" id="notice-date" class="filter-input" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;">
                        <input type="text" id="notice-stock" placeholder="股票名称/代码" class="filter-input" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; width: 150px;">
                        <select id="notice-type" class="filter-select" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;">
                            <option value="">全部类型</option>
                            <option value="业绩预告">业绩预告</option>
                            <option value="重大事项">重大事项</option>
                            <option value="股权变动">股权变动</option>
                            <option value="增发配股">增发配股</option>
                            <option value="其他">其他</option>
                        </select>
                        <button onclick="loadNotice()" class="filter-btn" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer;">查询</button>
                    </div>
                    
                    <div id="notice-stats" style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;"></div>
                    
                    <div id="notice-list" style="display: grid; gap: 16px;">
                        <div class="loading">加载中...</div>
                    </div>
                    
                    <div id="load-more" style="text-align: center; margin-top: 20px; display: none;">
                        <button onclick="loadMore()" style="padding: 10px 24px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer;">加载更多</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="app-footer" style="text-align: center; padding: 20px; color: #999; font-size: 12px; border-top: 1px solid #e9ecef;">
            <p>GS2026 Dashboard v2.0 | © 2026</p>
        </footer>
    </div>

    <script>
        // ========== 状态 ==========
        let currentPage = 1;
        const PAGE_SIZE = 20;
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('notice-date').value = new Date().toISOString().slice(0, 10);
            loadNotice();
        });
        
        // ========== 加载公告列表 ==========
        function loadNotice(append = false) {
            const date = document.getElementById('notice-date').value;
            const stock = document.getElementById('notice-stock').value;
            const type = document.getElementById('notice-type').value;
            
            let url = `/api/notice/list?page=${currentPage}&page_size=${PAGE_SIZE}`;
            if (date) url += `&date=${date.replace(/-/g, '')}`;
            if (stock) url += `&stock=${encodeURIComponent(stock)}`;
            if (type) url += `&type=${encodeURIComponent(type)}`;
            
            fetch(url).then(r => r.json()).then(response => {
                const data = response.data || response;
                const list = document.getElementById('notice-list');
                const more = document.getElementById('load-more');
                
                if (!append) list.innerHTML = '';
                
                if (!data.items || data.items.length === 0) {
                    if (!append) list.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无数据</div>';
                    more.style.display = 'none';
                    return;
                }
                
                data.items.forEach(item => {
                    list.insertAdjacentHTML('beforeend', renderNoticeCard(item));
                });
                
                more.style.display = (currentPage * PAGE_SIZE < data.total) ? 'block' : 'none';
            }).catch(err => {
                console.error('加载公告失败:', err);
                document.getElementById('notice-list').innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">加载失败</div>';
            });
        }
        
        function loadMore() {
            currentPage++;
            loadNotice(true);
        }
        
        // ========== 渲染公告卡片 ==========
        function renderNoticeCard(item) {
            // 使用公告ID作为标题
            const title = item.notice_id ? item.notice_id.substring(0, 16) + '...' : '未命名公告';
            // 获取判定依据
            let summary = '暂无分析摘要';
            if (item.judgment_basis && item.judgment_basis !== 'null') {
                try {
                    const basis = JSON.parse(item.judgment_basis);
                    if (Array.isArray(basis) && basis.length > 0) {
                        summary = basis.join('；');
                    } else {
                        summary = item.judgment_basis;
                    }
                } catch (e) {
                    summary = item.judgment_basis;
                }
                if (summary.length > 200) {
                    summary = summary.substring(0, 200) + '...';
                }
            }
            // 处理风险等级显示（处理乱码情况）
            let riskLevel = item.risk_level || '中';
            if (riskLevel.includes('?') || riskLevel.charCodeAt(0) > 10000) {
                riskLevel = '中'; // 乱码时显示默认值
            }
            // 处理消息类型显示（处理乱码情况）
            let noticeType = item.notice_type || '中性';
            if (noticeType.includes('?') || noticeType.charCodeAt(0) > 10000) {
                noticeType = '中性'; // 乱码时显示默认值
            }
            // 类型颜色
            const typeColor = noticeType === '利好' ? '#e8f5e9; color: #2e7d32;' : 
                             noticeType === '利空' ? '#ffebee; color: #c62828;' : 
                             '#f5f5f5; color: #616161;';
            // 风险颜色
            const riskColor = riskLevel === '高' ? '#ffebee; color: #c62828;' : 
                             riskLevel === '中' ? '#fff3e0; color: #ef6c00;' : 
                             '#e8f5e9; color: #2e7d32;';
            
            return `
                <div class="notice-card" style="background: white; border: 1px solid #e9ecef; border-radius: 8px; padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                        <div>
                            <span style="font-weight: 600; color: #333;">${item.stock_code || '未知代码'}</span>
                            <span style="margin-left: 8px; padding: 2px 8px; background: ${typeColor} border-radius: 4px; font-size: 12px;">${noticeType}</span>
                            <span style="margin-left: 8px; padding: 2px 8px; background: ${riskColor} border-radius: 4px; font-size: 12px;">风险:${riskLevel}</span>
                        </div>
                        <span style="color: #999; font-size: 12px;">${item.notice_date || ''}</span>
                    </div>
                    <h4 style="margin: 0 0 8px 0; font-size: 15px; color: #333;">${title}</h4>
                    <p style="margin: 0; color: #666; font-size: 13px; line-height: 1.6;">${summary}</p>
                    <div style="margin-top: 12px; display: flex; gap: 16px; font-size: 12px; color: #999;">
                        <span>📊 风险评分: ${item.risk_score || 50}</span>
                        <span>📈 类型评分: ${item.type_score || 50}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
