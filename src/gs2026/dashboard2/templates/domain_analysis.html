<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>领域分析 - GS2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/analysis_center.css') }}?v=1">
</head>
<body>
    <div class="app">
        <!-- 头部导航 - 与首页统一 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">GS2026</span>
                </div>
                <span class="header-divider">|</span>
                <span class="header-subtitle">领域分析</span>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/monitor" class="nav-item">数据监控</a>
                <a href="/collection" class="nav-item">数据采集</a>
                <a href="/analysis" class="nav-item">数据分析</a>
                <a href="/scheduler" class="nav-item">调度中心</a>
                <a href="/reports" class="nav-item">报告中心</a>
                <a href="/performance" class="nav-item">性能监控</a>
                <a href="/analysis-center" class="nav-item">分析中心</a>
            </nav>
        </header>

        <main class="app-main">
            <!-- 分析中心子模块导航 -->
            <div class="analysis-sub-nav" style="background: #f8f9fa; border-bottom: 1px solid #e9ecef; padding: 10px 20px;">
                <div style="display: flex; gap: 10px; max-width: 1400px; margin: 0 auto;">
                    <a href="/analysis-center" class="sub-nav-btn" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #666; font-size: 14px;">📈 涨停分析</a>
                    <a href="/analysis-center" class="sub-nav-btn" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #666; font-size: 14px;">📰 新闻分析</a>
                    <a href="/notice-analysis" class="sub-nav-btn" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #666; font-size: 14px;">📋 公告分析</a>
                    <a href="/domain-analysis" class="sub-nav-btn active" style="padding: 8px 16px; border-radius: 6px; text-decoration: none; color: #fff; background: #007bff; font-size: 14px;">🌐 领域分析</a>
                </div>
            </div>
            
            <!-- 动态内容区域 -->
            <div class="analysis-content" id="analysis-content" style="padding: 20px; max-width: 1400px; margin: 0 auto;">
                <div class="domain-container">
                    <!-- 【优化】筛选栏 - 类似新闻分析 -->
                    <div class="filter-bar" style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; padding: 16px; background: white; border-radius: 8px; border: 1px solid #e9ecef;">
                        <!-- 日期选择 -->
                        <input type="date" id="domain-date" class="filter-input" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;">
                        
                        <!-- 搜索框 -->
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="domain-search" placeholder="🔍 搜索标题或内容..." style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; width: 180px;">
                            <button onclick="applyFilters()" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer;">搜索</button>
                        </div>
                        
                        <span style="width: 1px; background: #ddd; margin: 0 4px; height: 32px;"></span>
                        
                        <!-- 评分滑块 -->
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="font-size: 13px; color: #666;">📊 评分</span>
                            <input type="range" id="domain-score" min="0" max="100" value="0" style="width: 100px; cursor: pointer;">
                            <span id="domain-score-value" style="font-size: 13px; color: #666; min-width: 30px;">≥0</span>
                        </div>
                        
                        <span style="width: 1px; background: #ddd; margin: 0 4px; height: 32px;"></span>
                        
                        <!-- 类型筛选按钮 -->
                        <button class="domain-filter-btn active" data-type="" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px;">全部</button>
                        <button class="domain-filter-btn" data-type="利好" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px;">🟢 利好</button>
                        <button class="domain-filter-btn" data-type="利空" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px;">🔴 利空</button>
                        <button class="domain-filter-btn" data-type="中性" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px;">⚪ 中性</button>
                        
                        <span style="width: 1px; background: #ddd; margin: 0 4px; height: 32px;"></span>
                        
                        <!-- 大小筛选 -->
                        <button class="domain-filter-btn" data-size="重大" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px;">🔥 重大</button>
                        <button class="domain-filter-btn" data-size="大" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px;">⬆ 大</button>
                        
                        <!-- 排序按钮 -->
                        <button id="domain-sort-btn" onclick="toggleSort()" style="padding: 6px 12px; border: 1px solid #007bff; border-radius: 6px; background: #007bff; color: white; cursor: pointer; font-size: 13px; margin-left: auto;">📊 按评分</button>
                    </div>
                    
                    <div id="domain-stats" style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;"></div>
                    
                    <div id="domain-list" style="display: grid; gap: 16px;">
                        <div class="loading">加载中...</div>
                    </div>
                    
                    <div id="load-more" style="text-align: center; margin-top: 20px; display: none;">
                        <button onclick="loadMore()" style="padding: 10px 24px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer;">加载更多</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="app-footer" style="text-align: center; padding: 20px; color: #999; font-size: 12px; border-top: 1px solid #e9ecef;">
            <p>GS2026 Dashboard v2.0 | © 2026</p>
        </footer>
    </div>

    <script>
        // ========== 状态 ==========
        let currentPage = 1;
        const PAGE_SIZE = 20;
        let currentType = '';  // 当前类型筛选
        let currentSize = '';  // 当前大小筛选
        let currentSort = 'score';  // 默认按评分排序
        let currentMinScore = 0;   // 默认最低评分0
        let currentSearch = '';    // 默认搜索为空
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('domain-date').value = new Date().toISOString().slice(0, 10);
            
            // 评分滑块事件
            const scoreSlider = document.getElementById('domain-score');
            const scoreValue = document.getElementById('domain-score-value');
            if (scoreSlider && scoreValue) {
                scoreSlider.addEventListener('input', function() {
                    currentMinScore = parseInt(this.value);
                    scoreValue.textContent = '≥' + currentMinScore;
                });
            }
            
            // 搜索框回车事件
            const searchInput = document.getElementById('domain-search');
            if (searchInput) {
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        applyFilters();
                    }
                });
            }
            
            // 类型/大小筛选按钮事件
            document.querySelectorAll('.domain-filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const type = this.dataset.type;
                    const size = this.dataset.size;
                    
                    if (type !== undefined) {
                        // 类型筛选
                        currentType = type;
                        document.querySelectorAll('.domain-filter-btn[data-type]').forEach(b => {
                            b.classList.remove('active');
                            b.style.background = 'white';
                            b.style.color = '#333';
                            b.style.borderColor = '#ddd';
                        });
                        this.classList.add('active');
                        this.style.background = '#007bff';
                        this.style.color = 'white';
                        this.style.borderColor = '#007bff';
                    } else if (size !== undefined) {
                        // 大小筛选 - 切换模式
                        if (currentSize === size) {
                            currentSize = '';  // 取消选择
                            this.classList.remove('active');
                            this.style.background = 'white';
                            this.style.color = '#333';
                        } else {
                            currentSize = size;
                            document.querySelectorAll('.domain-filter-btn[data-size]').forEach(b => {
                                b.classList.remove('active');
                                b.style.background = 'white';
                                b.style.color = '#333';
                            });
                            this.classList.add('active');
                            this.style.background = '#007bff';
                            this.style.color = 'white';
                        }
                    }
                    
                    currentPage = 1;
                    loadDomain();
                });
            });
            
            // 初始化默认选中"全部"
            const allBtn = document.querySelector('.domain-filter-btn[data-type=""]');
            if (allBtn) {
                allBtn.classList.add('active');
                allBtn.style.background = '#007bff';
                allBtn.style.color = 'white';
                allBtn.style.borderColor = '#007bff';
            }
            
            loadDomain();
        });
        
        // ========== 应用筛选 ==========
        function applyFilters() {
            currentSearch = document.getElementById('domain-search').value.trim();
            currentPage = 1;
            loadDomain();
        }
        
        // ========== 切换排序 ==========
        function toggleSort() {
            const sortBtn = document.getElementById('domain-sort-btn');
            if (currentSort === 'score') {
                currentSort = 'time';
                sortBtn.textContent = '📅 按时间';
            } else {
                currentSort = 'score';
                sortBtn.textContent = '📊 按评分';
            }
            currentPage = 1;
            loadDomain();
        }
        
        // ========== 加载领域列表 ==========
        function loadDomain(append = false) {
            const date = document.getElementById('domain-date').value;
            
            let url = `/api/domain/list?page=${currentPage}&page_size=${PAGE_SIZE}&sort=${currentSort}`;
            if (date) url += `&date=${date.replace(/-/g, '')}`;
            if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
            if (currentType) url += `&type=${encodeURIComponent(currentType)}`;
            if (currentSize) url += `&size=${encodeURIComponent(currentSize)}`;
            if (currentMinScore > 0) url += `&min_score=${currentMinScore}`;
            
            fetch(url).then(r => r.json()).then(response => {
                const data = response.data || response;
                const list = document.getElementById('domain-list');
                const more = document.getElementById('load-more');
                
                if (!append) list.innerHTML = '';
                
                if (!data.items || data.items.length === 0) {
                    if (!append) list.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无数据</div>';
                    more.style.display = 'none';
                    return;
                }
                
                data.items.forEach(item => {
                    list.insertAdjacentHTML('beforeend', renderDomainCard(item));
                });
                
                more.style.display = (currentPage * PAGE_SIZE < data.total) ? 'block' : 'none';
            }).catch(err => {
                console.error('加载领域数据失败:', err);
                document.getElementById('domain-list').innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">加载失败</div>';
            });
        }
        
        function loadMore() {
            currentPage++;
            loadDomain(true);
        }
        
        // ========== 渲染领域卡片 ==========
        function renderDomainCard(item) {
            const typeClass = item.news_type === '利好' ? 'bg-green' : item.news_type === '利空' ? 'bg-red' : 'bg-gray';
            const typeStyle = typeClass === 'bg-green' ? 'background: #e8f5e9; color: #2e7d32;' : 
                             typeClass === 'bg-red' ? 'background: #ffebee; color: #c62828;' : 
                             'background: #f5f5f5; color: #616161;';
            
            // 大小标记
            let sizeBadge = '';
            if (item.news_size === '重大') {
                sizeBadge = '<span style="margin-left: 4px; padding: 2px 6px; background: #fff3e0; color: #e65100; border-radius: 4px; font-size: 11px;">🔥重大</span>';
            } else if (item.news_size === '大') {
                sizeBadge = '<span style="margin-left: 4px; padding: 2px 6px; background: #e3f2fd; color: #1565c0; border-radius: 4px; font-size: 11px;">⬆大</span>';
            }
            
            return `
                <div class="domain-card" style="background: white; border: 1px solid #e9ecef; border-radius: 8px; padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                        <div>
                            <span style="font-weight: 600; color: #333;">${item.main_area || ''}</span>
                            <span style="margin: 0 4px; color: #999;">/</span>
                            <span style="color: #666;">${item.child_area || ''}</span>
                            <span style="margin-left: 8px; padding: 2px 8px; ${typeStyle} border-radius: 4px; font-size: 12px;">${item.news_type || '中性'}</span>
                            ${sizeBadge}
                        </div>
                        <span style="color: #999; font-size: 12px;">${item.event_time || ''}</span>
                    </div>
                    <h4 style="margin: 0 0 8px 0; font-size: 15px; color: #333;">${item.key_event || ''}</h4>
                    <p style="margin: 0 0 12px 0; color: #666; font-size: 13px; line-height: 1.6;">${item.brief_desc || '暂无描述'}</p>
                    <div style="background: #f8f9fa; padding: 12px; border-radius: 6px; margin-bottom: 12px;">
                        <p style="margin: 0; color: #555; font-size: 12px; line-height: 1.5;"><strong>原因分析:</strong> ${item.reason_analysis || '无'}</p>
                    </div>
                    <div style="display: flex; gap: 16px; font-size: 12px; color: #999; flex-wrap: wrap;">
                        <span style="color: #007bff; font-weight: 600;">📊 评分: ${item.composite_score || 0}</span>
                        <span>🏷️ 板块: ${(item.sectors || []).slice(0, 3).join(', ')}</span>
                        <span>💡 概念: ${(item.concepts || []).slice(0, 3).join(', ')}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
