<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GS2026 - 调度中心</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}?v=3">
    <style>
        /* 调度中心特有样式 */
        .scheduler-container {
            padding: 20px;
        }
        
        .scheduler-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .scheduler-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .scheduler-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-primary {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: #5a6fd6;
        }
        
        .btn-secondary {
            padding: 8px 16px;
            background: #f5f5f5;
            color: #333;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        
        /* 两级选择器 */
        .task-selector {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .selector-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        
        .selector-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .selector-group {
            flex: 1;
        }
        
        .selector-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .selector-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        
        .selector-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 任务列表 */
        .task-list {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .task-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .task-list-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .task-count {
            font-size: 14px;
            color: #667eea;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .task-item:hover {
            background: #f8f9fb;
            border-color: #667eea;
        }
        
        .task-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
        
        .task-desc {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        
        .task-schedule {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .schedule-input {
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .task-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-enabled {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-disabled {
            background: #f5f5f5;
            color: #999;
        }
        
        /* 定时设置 */
        .schedule-config {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .config-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        
        .config-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .config-group {
            flex: 1;
        }
        
        .config-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .config-group input,
        .config-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .config-group input:focus,
        .config-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .cron-preview {
            background: #f8f9fb;
            padding: 10px 15px;
            border-radius: 6px;
            font-family: Consolas, monospace;
            font-size: 14px;
            color: #667eea;
            margin-top: 10px;
        }
        
        /* 操作按钮 */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <span class="logo-text">GS2026</span>
                </div>
                <span class="header-divider">|</span>
                <span class="header-subtitle">数据监控</span>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="/monitor" class="nav-item">数据监控</a>
                <a href="/collection" class="nav-item">数据采集</a>
                <a href="/analysis" class="nav-item">数据分析</a>
                <a href="/scheduler" class="nav-item active">调度中心</a>
                <a href="/reports" class="nav-item">报表中心</a>
            </nav>
        </header>

        <main class="app-main">
            <div class="scheduler-container">
                <!-- 页面标题 -->
                <div class="scheduler-header">
                    <h1 class="scheduler-title">⏰ 调度中心</h1>
                    <div class="scheduler-actions">
                        <button class="btn-secondary" onclick="loadTasks()">🔄 刷新</button>
                        <button class="btn-primary" onclick="saveSchedules()">💾 保存配置</button>
                    </div>
                </div>
                
                <!-- 两级任务选择器 -->
                <div class="task-selector">
                    <div class="selector-title">📋 选择任务（两级）</div>
                    <div class="selector-row">
                        <div class="selector-group">
                            <label>第一级：模块</label>
                            <select id="module-select" onchange="onModuleChange()">
                                <option value="">请选择模块</option>
                                <option value="monitor">开市采集</option>
                                <option value="base">基础采集</option>
                                <option value="news">消息采集</option>
                                <option value="risk">风险采集</option>
                            </select>
                        </div>
                        <div class="selector-group">
                            <label>第二级：任务</label>
                            <select id="task-select" onchange="onTaskChange()">
                                <option value="">请选择任务</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="addToSchedule()">➕ 添加到调度列表</button>
                </div>
                
                <!-- 任务列表 -->
                <div class="task-list">
                    <div class="task-list-header">
                        <span class="task-list-title">📋 调度任务列表</span>
                        <span class="task-count">共 <span id="task-count">0</span> 个任务</span>
                    </div>
                    <div id="scheduled-tasks">
                        <!-- 动态生成任务列表 -->
                        <div class="task-item">
                            <input type="checkbox" class="task-checkbox" checked>
                            <div class="task-info">
                                <div class="task-name">基础采集 - 涨停板数据</div>
                                <div class="task-desc">每日 09:30 自动执行</div>
                            </div>
                            <div class="task-schedule">
                                <input type="time" class="schedule-input" value="09:30">
                                <span class="task-status status-enabled">已启用</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 定时配置 -->
                <div class="schedule-config">
                    <div class="config-title">⚙️ 定时配置</div>
                    <div class="config-row">
                        <div class="config-group">
                            <label>执行频率</label>
                            <select id="frequency">
                                <option value="once">仅一次</option>
                                <option value="daily" selected>每天</option>
                                <option value="weekly">每周</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="config-group">
                            <label>执行时间</label>
                            <input type="time" id="exec-time" value="09:30">
                        </div>
                    </div>
                    <div class="cron-preview">
                        Cron 表达式: <span id="cron-expression">0 30 9 * * *</span>
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="action-bar">
                    <button class="btn-secondary" onclick="clearAll()">🗑️ 清空全部</button>
                    <button class="btn-primary" onclick="saveSchedules()">✅ 保存并启用</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 模块任务映射
        const moduleTasks = {
            monitor: [
                { id: 'stock', name: '股票监控' },
                { id: 'bond', name: '债券监控' },
                { id: 'industry', name: '行业监控' },
                { id: 'dp_signal', name: '大盘信号' },
                { id: 'gp_zq_signal', name: '股债联动' }
            ],
            base: [
                { id: 'ztb', name: '涨停板数据' },
                { id: 'zt_zb', name: '涨停炸板数据' },
                { id: 'zskj', name: '指数宽基' },
                { id: 'today_lhb', name: '今日龙虎榜' },
                { id: 'rzrq', name: '融资融券' },
                { id: 'gsdt', name: '公司动态' },
                { id: 'history_lhb', name: '历史龙虎榜' },
                { id: 'risk_tdx', name: '通达信风险' },
                { id: 'industry_ths', name: '同花顺行业' },
                { id: 'industry_code_component_ths', name: '同花顺行业成分' },
                { id: 'baostock', name: 'Baostock数据' },
                { id: 'wencai_base', name: '问财基础数据' },
                { id: 'wencai_hot', name: '问财热股数据' },
                { id: 'bond_base', name: '可转债base' },
                { id: 'bond_daily', name: '可转债daily' },
                { id: 'bk_gn', name: '板块概念' }
            ],
            news: [
                { id: 'news_cj', name: '财经早餐' },
                { id: 'news_ft', name: '全球快讯' },
                { id: 'news_futu', name: '快讯-富途' },
                { id: 'live_ths', name: '财经直播-同花顺' },
                { id: 'cls_history', name: '财联社历史' },
                { id: 'new_stock', name: '新股申购' },
                { id: 'hot_query', name: '热门查询' },
                { id: 'xinhua', name: '新华财经' }
            ],
            risk: [
                { id: 'risk_wencai_day', name: '问财风险-日' },
                { id: 'risk_wencai_year', name: '问财风险-年' },
                { id: 'risk_notice', name: '公告风险' },
                { id: 'risk_akshare', name: 'Akshare风险' }
            ]
        };
        
        // 已调度任务列表
        let scheduledTasks = [];
        
        // 模块选择变化
        function onModuleChange() {
            const moduleSelect = document.getElementById('module-select');
            const taskSelect = document.getElementById('task-select');
            const moduleId = moduleSelect.value;
            
            // 清空任务选择
            taskSelect.innerHTML = '<option value="">请选择任务</option>';
            
            if (moduleId && moduleTasks[moduleId]) {
                moduleTasks[moduleId].forEach(task => {
                    const option = document.createElement('option');
                    option.value = task.id;
                    option.textContent = task.name;
                    taskSelect.appendChild(option);
                });
            }
        }
        
        // 任务选择变化
        function onTaskChange() {
            // 可以在这里添加任务详情显示
        }
        
        // 添加到调度列表
        function addToSchedule() {
            const moduleSelect = document.getElementById('module-select');
            const taskSelect = document.getElementById('task-select');
            const execTime = document.getElementById('exec-time').value;
            
            if (!moduleSelect.value || !taskSelect.value) {
                alert('请选择模块和任务');
                return;
            }
            
            const moduleName = moduleSelect.options[moduleSelect.selectedIndex].text;
            const taskName = taskSelect.options[taskSelect.selectedIndex].text;
            
            const task = {
                id: Date.now(),
                moduleId: moduleSelect.value,
                taskId: taskSelect.value,
                moduleName: moduleName,
                taskName: taskName,
                execTime: execTime,
                enabled: true
            };
            
            scheduledTasks.push(task);
            renderTaskList();
        }
        
        // 渲染任务列表
        function renderTaskList() {
            const container = document.getElementById('scheduled-tasks');
            const countSpan = document.getElementById('task-count');
            
            countSpan.textContent = scheduledTasks.length;
            
            if (scheduledTasks.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无调度任务</div>';
                return;
            }
            
            container.innerHTML = scheduledTasks.map(task => `
                <div class="task-item">
                    <input type="checkbox" class="task-checkbox" ${task.enabled ? 'checked' : ''} 
                           onchange="toggleTask(${task.id})">
                    <div class="task-info">
                        <div class="task-name">${task.moduleName} - ${task.taskName}</div>
                        <div class="task-desc">每日 ${task.execTime} 自动执行</div>
                    </div>
                    <div class="task-schedule">
                        <input type="time" class="schedule-input" value="${task.execTime}" 
                               onchange="updateTaskTime(${task.id}, this.value)">
                        <span class="task-status ${task.enabled ? 'status-enabled' : 'status-disabled'}">
                            ${task.enabled ? '已启用' : '已禁用'}
                        </span>
                        <button onclick="removeTask(${task.id})" style="margin-left: 10px; padding: 4px 8px; background: #ffebee; color: #c62828; border: none; border-radius: 4px; cursor: pointer;">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 切换任务启用状态
        function toggleTask(taskId) {
            const task = scheduledTasks.find(t => t.id === taskId);
            if (task) {
                task.enabled = !task.enabled;
                renderTaskList();
            }
        }
        
        // 更新任务时间
        function updateTaskTime(taskId, time) {
            const task = scheduledTasks.find(t => t.id === taskId);
            if (task) {
                task.execTime = time;
                renderTaskList();
            }
        }
        
        // 删除任务
        function removeTask(taskId) {
            scheduledTasks = scheduledTasks.filter(t => t.id !== taskId);
            renderTaskList();
        }
        
        // 清空全部
        function clearAll() {
            if (confirm('确定要清空所有调度任务吗？')) {
                scheduledTasks = [];
                renderTaskList();
            }
        }
        
        // 保存配置
        function saveSchedules() {
            if (scheduledTasks.length === 0) {
                alert('请先添加调度任务');
                return;
            }
            
            // 这里应该调用后端 API 保存配置
            console.log('保存调度配置:', scheduledTasks);
            alert(`已保存 ${scheduledTasks.length} 个调度任务`);
        }
        
        // 刷新任务列表
        function loadTasks() {
            // 这里应该从后端加载已保存的调度任务
            console.log('加载调度任务');
            renderTaskList();
        }
        
        // 更新 Cron 表达式预览
        document.getElementById('exec-time')?.addEventListener('change', function() {
            const time = this.value;
            const [hour, minute] = time.split(':');
            document.getElementById('cron-expression').textContent = `0 ${minute} ${hour} * * *`;
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderTaskList();
        });
    </script>
</body>
</html>
