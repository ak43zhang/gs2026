# config.yaml 文件内容
# 公共配置
common:
#    url: "mysql+mysqlconnector://root:123456@192.168.0.109:3306/gs?charset=utf8&ssl_disabled=True"
#    url: "mysql+mysqlconnector://root:123456@192.168.0.101:3306/gs?charset=utf8&ssl_disabled=True"
    url: "mysql+pymysql://root:123456@192.168.0.101:3306/gs?charset=utf8&ssl_disabled=True"
    mysql_ip: "192.168.0.101"

    redis:
        host: 'localhost'
        port: 6379

    deepseek_corpus_version:
        cls: '1.0.0'
        combine: '1.0.0'
        notice: '1.0.0'

mysql:
    host: "192.168.0.101"
    port: 3306
    user: "root"
    password: "123456"
    database: "gs"

# Dashboard 配置
dashboard:
    host: "0.0.0.0"
    port: 5000
    debug: true
    refresh_interval: 30000  # 数据刷新间隔（毫秒）
    secret_key: "gs2026-dashboard-secret-key"
    use_mysql: true  # 是否允许查询 MySQL（Redis 无数据时回退到 MySQL）

# 性能诊断工具配置
performance_monitor:
    enabled: true              # 是否启用API性能监控
    slow_threshold_ms: 500      # 慢请求阈值（毫秒）
    max_metrics: 1000           # 最大保留指标数
    log_slow_requests: true     # 是否记录慢请求

db_profiler:
    enabled: true              # 是否启用数据库分析器
    slow_threshold_ms: 100      # 慢查询阈值（毫秒）
    max_queries: 500            # 最大保留查询数
    log_slow_queries: true      # 是否记录慢查询

frontend_perf:
    enabled: true              # 是否默认启用前端性能监控
    max_metrics: 100            # 最大保留指标数
    show_panel_shortcut: true   # 是否启用快捷键(Ctrl+Shift+P)显示面板

